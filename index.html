<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cinema - Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #FFD700; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 900px; margin-top: 20px; }
        
        #videoTitle { 
            font-size: 1.5rem; margin-bottom: 20px; font-weight: 600;
            border-left: 4px solid var(--accent); padding-left: 15px;
        }

        .video-box {
            position: relative; width: 100%; padding-bottom: 56.25%;
            background: #000; border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 1px solid #333;
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .controls { display: flex; gap: 15px; margin-top: 25px; }
        .btn {
            padding: 12px 30px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: 600; transition: 0.3s; text-transform: uppercase;
        }
        .btn-p1 { background: var(--accent); color: #000; }
        .btn-p2 { background: #222; color: #fff; border: 1px solid #444; }
        .btn-p2.unlocked { background: var(--accent); color: #000; border: none; }

        /* Middle Popup */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal {
            background: #151515; padding: 35px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid var(--glass); box-shadow: 0 0 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal h2 { color: var(--accent); margin-bottom: 15px; }
        .modal p { color: #bbb; margin-bottom: 25px; font-size: 0.95rem; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; }
        .m-btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .m-verify { background: var(--accent); color: #000; }
        .m-cancel { background: transparent; color: #777; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="videoTitle">Loading Stream...</h1>
        <div class="video-box">
            <iframe id="mainFrame" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div class="controls">
            <button class="btn btn-p1" id="btnP1">Part 1</button>
            <button class="btn btn-p2" id="btnP2">🔒 Part 2</button>
        </div>
    </div>

    <!-- Middle Centered Popup -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Unlock Part 2</h2>
            <p>Verification is required to access this content. It only takes a minute!</p>
            <div class="modal-btns">
                <button class="m-btn m-verify" id="startVerify">Verify Now</button>
                <button class="m-btn m-cancel" id="closeModal">Maybe Later</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIDYD8OL_WlnIdUI5bavy3A_pKXVcg_c",
            authDomain: "serial-75744.firebaseapp.com",
            databaseURL: "https://serial-75744-default-rtdb.firebaseio.com",
            projectId: "serial-75744",
            storageBucket: "serial-75744.firebasestorage.app",
            messagingSenderId: "284516275768",
            appId: "1:284516275768:web:c5f83c3ddb33e648c778cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videoRef = ref(db, 'videos/main');

        const frame = document.getElementById('mainFrame');
        const btnP2 = document.getElementById('btnP2');
        const overlay = document.getElementById('modalOverlay');
        let currentData = null;

        // Logic: Generate a unique ID based on the URL to force re-lock when URL changes
        const getLockKey = (url) => 'verified_' + btoa(url).substring(0, 16);

        onValue(videoRef, (snapshot) => {
            currentData = snapshot.val();
            if (currentData) {
                document.getElementById('videoTitle').innerText = currentData.title;
                
                const lockKey = getLockKey(currentData.part2_url);
                const urlParams = new URLSearchParams(window.location.search);

                // If just returned from shortlink
                if (urlParams.get('verify') === 'true') {
                    localStorage.setItem(lockKey, 'true');
                }

                const isUnlocked = localStorage.getItem(lockKey) === 'true';

                if (isUnlocked) {
                    btnP2.innerHTML = "Part 2";
                    btnP2.classList.add('unlocked');
                    // Play Part 2 only if user just verified, otherwise Part 1
                    frame.src = (urlParams.get('verify') === 'true') ? currentData.part2_url : currentData.part1_url;
                } else {
                    btnP2.innerHTML = "🔒 Part 2";
                    btnP2.classList.remove('unlocked');
                    frame.src = currentData.part1_url;
                }
            }
        });

        document.getElementById('btnP1').onclick = () => { frame.src = currentData.part1_url; };

        btnP2.onclick = () => {
            const lockKey = getLockKey(currentData.part2_url);
            if (localStorage.getItem(lockKey) === 'true') {
                frame.src = currentData.part2_url;
            } else {
                overlay.style.display = 'flex';
            }
        };

        document.getElementById('startVerify').onclick = () => { window.location.href = currentData.shortlink_url; };
        document.getElementById('closeModal').onclick = () => { overlay.style.display = 'none'; };
    </script>
</body>
</html>
